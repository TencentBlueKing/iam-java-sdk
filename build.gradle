plugins {
    // Apply the java-library plugin to add support for Java Library
    id 'java'
    id 'idea'
    id 'io.github.gradle-nexus.publish-plugin' version '1.3.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    // Use jcenter for resolving dependencies.
    // You can declare any Maven/Ivy/file repository here.
    mavenLocal()
    maven { url "https://plugins.gradle.org/m2/" }
    mavenCentral()
}

ext {
    // https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-core
    set('jacksonVersion', "2.9.10")
    // https://mvnrepository.com/artifact/org.projectlombok/lombok
    set('lombokVersion', '1.18.36')
    set("junitVersion", "5.4.2")

    String iamVersion = (System.getProperty("iamVersion") ?: "2.0.0")
    if (System.getProperty("snapshot") == "true") {
        set('iamVersion', iamVersion + "-SNAPSHOT")
    } else {
        set('iamVersion', iamVersion)
    }
}

dependencies {
    // This dependency is exported to consumers, that is to say found on their compile classpath.
    //api 'org.apache.commons:commons-math3:3.6.1'

    // This dependency is used internally, and not exposed to consumers on their own compile classpath.
    implementation 'com.google.guava:guava:27.1-jre'

    implementation(group: 'org.projectlombok', name: 'lombok', version: "${lombokVersion}")

    implementation(group: 'com.fasterxml.jackson.core', name: 'jackson-core', version: "${jacksonVersion}")
    implementation(group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: "${jacksonVersion}")
    implementation(group: 'com.fasterxml.jackson.core', name: 'jackson-annotations', version: "${jacksonVersion}")

    // https://mvnrepository.com/artifact/org.apache.commons/commons-lang3
    implementation(group: 'org.apache.commons', name: 'commons-lang3', version: '3.10')

    // https://mvnrepository.com/artifact/org.apache.commons/commons-collections4
    implementation(group: 'org.apache.commons', name: 'commons-collections4', version: '4.4')

    // https://mvnrepository.com/artifact/org.apache.httpcomponents/httpclient
    implementation(group: 'org.apache.httpcomponents', name: 'httpclient', version: '4.5.12')

    // https://mvnrepository.com/artifact/org.slf4j/slf4j-api
    implementation(group: 'org.slf4j', name: 'slf4j-api', version: '1.7.30')

    // https://mvnrepository.com/artifact/jakarta.servlet/jakarta.servlet-api
    compileOnly group: 'jakarta.servlet', name: 'jakarta.servlet-api', version: '6.1.0'

    // Use JUnit Jupiter API for testing.
    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"

    // Use JUnit Jupiter Engine for testing.
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"

    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
}

test {
    // Use junit platform for unit tests
    useJUnitPlatform()
}

jar {
    manifest {
        attributes("Main-Class": "com.tencent.bk.sdk.iam.AuthHelper",
                "Implementation-Title": "Gradle")
    }
    into('lib') {
        from configurations.runtimeClasspath
    }
}

tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
}

group "com.tencent.bk.sdk"
version "${iamVersion}"

// Nexus 发布配置（用于发布到 Maven Central）
// 凭据优先级: System Property > 环境变量 > gradle.properties
nexusPublishing {
    repositories {
        sonatype {
            // 根据 snapshot 参数选择不同的配置
            def isSnapshot = System.getProperty("snapshot") == "true"
            
            // 仓库 URL
            def repoUrl = isSnapshot
                ? (System.getProperty("snapshotMavenRepoDeployUrl") 
                    ?: System.getenv("build_snapshotMavenRepoDeployUrl") 
                    ?: findProperty('MAVEN_REPO_SNAPSHOT_DEPLOY_URL')
                    ?: "https://oss.sonatype.org/content/repositories/snapshots/")
                : (System.getProperty("mavenRepoDeployUrl") 
                    ?: System.getenv("build_mavenRepoDeployUrl") 
                    ?: findProperty('MAVEN_REPO_DEPLOY_URL')
                    ?: "https://ossrh-staging-api.central.sonatype.com/service/local/")
            nexusUrl.set(uri(repoUrl))
            snapshotRepositoryUrl.set(uri(repoUrl))
            
            // 用户名
            def repoUsername = isSnapshot
                ? (System.getProperty("snapshotMavenRepoUsername") 
                    ?: System.getenv("build_snapshotMavenRepoUsername") 
                    ?: findProperty('MAVEN_REPO_SNAPSHOT_USERNAME'))
                : (System.getProperty("mavenRepoUsername") 
                    ?: System.getenv("build_mavenRepoUsername") 
                    ?: findProperty('MAVEN_REPO_USERNAME'))
            if (repoUsername != null) {
                username.set(repoUsername)
            }
            
            // 密码
            def repoPassword = isSnapshot
                ? (System.getProperty("snapshotMavenRepoPassword") 
                    ?: System.getenv("build_snapshotMavenRepoPassword") 
                    ?: findProperty('MAVEN_REPO_SNAPSHOT_PASSWORD'))
                : (System.getProperty("mavenRepoPassword") 
                    ?: System.getenv("build_mavenRepoPassword") 
                    ?: findProperty('MAVEN_REPO_PASSWORD'))
            if (repoPassword != null) {
                password.set(repoPassword)
            }
        }
    }
}

apply from: "task_deploy_to_maven.gradle"
